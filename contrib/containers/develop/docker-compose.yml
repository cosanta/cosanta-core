services:
  container:
    entrypoint: /bin/bash
    build:
      context: '..'
      dockerfile: './develop/Dockerfile'
      args:
        USER_ID: 1000   # set this to $(id -u) of the host
        GROUP_ID: 1000  # set this to $(id -g) of the host
    ports:
      - "9606:9606"           # Mainnet Ports
      - "60606:60606"
      - "9696:9696"           # Testnet Ports
      - "60696:60696"
    security_opt:
      - seccomp:unconfined
    stdin_open: true  # Equivalent to -i
    tty: true         # Equivalent to -t
    volumes:
      - type: bind
        source: ../../..
        target: /src/cosanta
